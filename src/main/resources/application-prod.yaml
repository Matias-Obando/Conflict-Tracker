spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: update   # para la práctica; en prod usare create-only/migrations
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

server:
  port: ${PORT:8080}