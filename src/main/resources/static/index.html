<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker</title>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f3f4f6;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .status {
            display: inline-block;
            padding: 0.15rem 0.45rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .status.ACTIVE { background: #16a34a; }
        .status.FROZEN { background: #eab308; }
        .status.ENDED  { background: #6b7280; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        thead {
            background: #e5e7eb;
        }

        th, td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }

        th {
            font-weight: 600;
        }

        tr:hover {
            background: #f9fafb;
        }

        #loading, #error {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        #loading {
            color: #6b7280;
        }

        #error {
            color: #b91c1c;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Conflict Tracker API</h1>

    <p>
        Esta página hace una petición
        <code>GET /api/v1/conflicts</code> a tu backend y muestra los resultados en la tabla.
    </p>

    <div id="loading">Cargando conflictos...</div>
    <div id="error" style="display:none;"></div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Fecha inicio</th>
            <th>Estado</th>
            <th>Descripción</th>
            <th>Países</th>
        </tr>
        </thead>
        <tbody id="conflicts-body">
        <!-- Filas generadas por JavaScript -->
        </tbody>
    </table>
</div>

<script>
    async function loadConflicts() {
        const tbody = document.getElementById("conflicts-body");
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");

        loading.style.display = "block";
        error.style.display = "none";
        tbody.innerHTML = "";

        try {
            const response = await fetch("/api/v1/conflicts");

            if (!response.ok) {
                throw new Error("Error HTTP " + response.status);
            }

            const conflicts = await response.json();

            if (conflicts.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">No hay conflictos en la base de datos.</td>
                    </tr>
                `;
                return;
            }

            conflicts.forEach(conflict => {
                const tr = document.createElement("tr");

                const countries = conflict.countryCodes
                    ? Array.from(conflict.countryCodes).join(", ")
                    : "";

                tr.innerHTML = `
                    <td>${conflict.id}</td>
                    <td>${conflict.name}</td>
                    <td>${conflict.startDate ?? ""}</td>
                    <td>
                        <span class="status ${conflict.status}">
                            ${conflict.status}
                        </span>
                    </td>
                    <td>${conflict.description ?? ""}</td>
                    <td>${countries}</td>
                `;

                tbody.appendChild(tr);
            });

        } catch (e) {
            console.error(e);
            error.textContent = "No se han podido cargar los conflictos: " + e.message;
            error.style.display = "block";
        } finally {
            loading.style.display = "none";
        }
    }

    // Cargar al abrir la página
    loadConflicts();
</script>
</body>
</html>
