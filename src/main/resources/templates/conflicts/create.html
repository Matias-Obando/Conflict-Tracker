<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Crear conflicto</title>

    <!-- Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { padding: 24px; }
        .container { max-width: 900px; }
    </style>
</head>
<body>
<div class="container">

    <h1 class="text-center mb-4">Crear conflicto</h1>

    <form th:action="@{/web/conflicts}" th:object="${conflict}" method="post" class="card p-4 shadow-sm">

        <!-- Nombre -->
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Nombre del conflicto">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <!-- Fecha inicio -->
        <div class="mb-3">
            <label class="form-label">Fecha inicio</label>
            <input type="date" class="form-control" th:field="*{startDate}">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('startDate')}"
                 th:errors="*{startDate}"></div>
        </div>

        <!-- Estado -->
        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{status}">
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('status')}"
                 th:errors="*{status}"></div>
        </div>

        <!-- Descripción -->
        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="4" th:field="*{description}" placeholder="Descripción corta"></textarea>
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>

        <!-- Botones -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a class="btn btn-outline-secondary" th:href="@{/web/conflicts}">Cancelar</a>
        </div>

    </form>

</div>
</body>
</html>
